version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumiq-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: lumiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lumiq-network

  redis:
    image: redis:7-alpine
    container_name: lumiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lumiq-network

  minio:
    image: minio/minio:latest
    container_name: lumiq-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lumiq-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  lumiq-network:
    driver: bridge
